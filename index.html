<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simran's UX/UI Design Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Montaga&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #1e4d2b;
            --color-secondary: #2c6e49;
            --color-accent: #4c956c;
            --color-background: #fdf6e3;
            --color-text: #34495e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montaga', serif;
        }

        body, html {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background-color: var(--color-background);
            color: var(--color-text);
        }

        .parallax {
            perspective: 1px;
            height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .parallax__layer {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
        }

        .parallax__layer--base {
            transform: translateZ(0);
        }

        .parallax__layer--back {
            transform: translateZ(-1px) scale(2);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem;
            background-color: rgba(30, 77, 43, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 90%;
            top: 1rem;
            left: 5%;
            z-index: 1000;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--color-background);
        }

        .nav-links {
            display: none;
        }

        .nav-links a {
            color: var(--color-background);
            text-decoration: none;
            margin-left: 1rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--color-accent);
        }

        .hamburger {
            width: 30px;
            height: 30px;
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .hamburger:hover {
            transform: scale(1.1);
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background-color: var(--color-background);
            position: absolute;
            transition: all 0.3s ease;
        }

        .hamburger span:first-child {
            top: 25%;
        }

        .hamburger span:nth-child(2) {
            top: 50%;
            transform: translateY(-50%);
        }

        .hamburger span:last-child {
            bottom: 25%;
        }

        .hamburger.open span:first-child {
            top: 50%;
            transform: translateY(-50%) rotate(45deg);
        }

        .hamburger.open span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.open span:last-child {
            bottom: 50%;
            transform: translateY(50%) rotate(-45deg);
        }

        .menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 250px;
            height: 100%;
            background-color: rgba(30, 77, 43, 0.95);
            transition: 0.4s;
            padding: 2rem;
            z-index: 1001;
            backdrop-filter: blur(10px);
        }

        .menu.open {
            right: 0;
        }

        .menu a {
            display: block;
            color: var(--color-background);
            text-decoration: none;
            margin-bottom: 1rem;
            font-size: 1.2rem;
            transition: color 0.3s ease;
        }

        .menu a:hover {
            color: var(--color-accent);
        }

        .close-icon {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--color-background);
        }

        main {
            padding: 5rem 2rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            gap: 2rem;
        }

        h1 {
            font-size: 5rem;
            font-weight: bold;
            margin-bottom: 2rem;
            color: var(--color-primary);
        }

        .description {
            background-color: rgba(30, 77, 43, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            max-width: 600px;
            text-align: center;
            font-size: 1.2rem;
            line-height: 1.6;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .cta {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 2rem;
            color: var(--color-secondary);
        }

        .links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
            width: 100%;
            margin-top: 2rem;
        }

        .links a {
            flex: 1 1 100%;
            background-color: var(--color-primary);
            color: var(--color-background);
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            text-decoration: none;
            font-size: 2rem;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .links a:hover {
            background-color: var(--color-secondary);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        footer {
            background-color: var(--color-primary);
            padding: 2rem;
            color: var(--color-background);
            text-align: center;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
        }

        footer h3 {
            margin-bottom: 1rem;
        }

        .footer-links {
            display: flex;
            justify-content: space-around;
            max-width: 600px;
            margin: 0 auto;
        }

        .footer-links a {
            color: var(--color-background);
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--color-accent);
            transform: translateY(-5px);
        }

        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.3;
        }

        /* Darkened background animations */
        .background-animation div {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(30, 77, 43, 0.35); /* Slightly darker */
            animation: animate 25s linear infinite;
            bottom: -150px;
        }

        .background-animation div:nth-child(1) {
            left: 25%;
            width: 80px;
            height: 80px;
            animation-delay: 0s;
        }

        .background-animation div:nth-child(2) {
            left: 10%;
            width: 20px;
            height: 20px;
            animation-delay: 2s;
            animation-duration: 12s;
        }

        .background-animation div:nth-child(3) {
            left: 70%;
            width: 20px;
            height: 20px;
            animation-delay: 4s;
        }

        .background-animation div:nth-child(4) {
            left: 40%;
            width: 60px;
            height: 60px;
            animation-delay: 0s;
            animation-duration: 18s;
        }

       .background-animation div:nth-child(4) {
            left: 40%;
            width: 60px;
            height: 60px;
            animation-delay: 0s;
            animation-duration: 18s;
        }

        .background-animation div:nth-child(5) {
            left: 65%;
            width: 20px;
            height: 20px;
            animation-delay: 0s;
        }

        .background-animation div:nth-child(6) {
            left: 75%;
            width: 110px;
            height: 110px;
            animation-delay: 3s;
        }

        .background-animation div:nth-child(7) {
            left: 35%;
            width: 150px;
            height: 150px;
            animation-delay: 7s;
        }

        .background-animation div:nth-child(8) {
            left: 50%;
            width: 25px;
            height: 25px;
            animation-delay: 15s;
            animation-duration: 45s;
        }

        @keyframes animate {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
                border-radius: 0;
            }
            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
                border-radius: 50%;
            }
        }

        /* Larger device layout */
        @media (min-width: 768px) {
            .hero {
                flex-direction: row;
                justify-content: space-between;
                text-align: left;
            }

            h1 {
                font-size: 6rem;
            }

            .description {
                text-align: left;
                max-width: 500px;
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="background-animation">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>

    <nav>
        <div class="logo">Simran's Design</div>
        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="menu" id="menu">
        <span class="close-icon" onclick="toggleMenu()">×</span>
        <a href="#">Home</a>
        <a href="#">Portfolio</a>
        <a href="#">Contact</a>
    </div>

    <div class="parallax">
        <div class="parallax__layer parallax__layer--base">
            <main>
                <section class="hero">
                    <h1>Hi, I'm Simran</h1>
                    <div class="description">
                        I'm an aspiring UX/UI designer. My journey involves crafting engaging, intuitive, and user-friendly designs. Let's build something amazing together!
                    </div>
                </section>
            </main>
        </div>
    </div>

    <footer>
        <h3>Connect with me</h3>
        <div class="footer-links">
            <a href="#">LinkedIn</a>
            <a href="#">Twitter</a>
            <a href="#">Instagram</a>
        </div>
    </footer>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('menu');
            menu.classList.toggle('open');

            const hamburger = document.querySelector('.hamburger');
            hamburger.classList.toggle('open');
        }
    </script>

</body>
</html>
